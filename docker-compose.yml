version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - AI4MH_APP_NAME=AI4MH Production
      - AI4MH_ALLOWED_ORIGINS=["http://localhost", "http://localhost:80"]
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
